version: "3.9"

services:
  mssql-express:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: mssql-express
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SenhaForte@123"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  mssql_data:

version: "3.9"

services:
  oracle-xe-11g:
    image: oracleinanutshell/oracle-xe-11g
    container_name: oracle-xe-1118c
    ports:
      - "1521:1521"   # Porta de conexão SQL
      - "5500:5500"   # Oracle EM Express (interface web)
    environment:
      ORACLE_PASSWORD: "oracle"     # Senha do usuário SYSTEM/SYS
      ORACLE_DATABASE: "XE"         # Nome do banco
      TZ: "America/Sao_Paulo"       # Timezone
    volumes:
      - /usr/local/oracle/oradata:/opt/oracle/oradata              # Dados persistentes
    restart: unless-stopped
